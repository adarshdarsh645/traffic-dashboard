<!DOCTYPE html>
<html>

<head>
<title>Traffic Control Dashboard</title>

<style>

body{
margin:0;
font-family:"Segoe UI",Roboto,Arial,sans-serif;
color:#e2e8f0;

background-image:
linear-gradient(rgba(15,23,42,0.88),rgba(2,6,23,0.9)),
url("background.png");

background-size:cover;
background-position:center;
background-attachment:fixed;

display:flex;
flex-direction:column;
align-items:center;
}

header{
text-align:center;
padding:35px;
font-size:34px;
font-weight:600;
letter-spacing:1px;
}

.dashboard{
width:800px;
max-width:90%;
margin-top:20px;
}

.container{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:50px;
justify-items:center;
}

.lane{
background:rgba(30,41,59,0.70);
padding:25px;
width:250px;
border-radius:16px;
text-align:center;
border:1px solid #334155;

box-shadow:0 10px 25px rgba(0,0,0,0.6);
backdrop-filter:blur(6px);

transition:all 0.3s ease;
}

.lane:hover{
transform:translateY(-5px);
box-shadow:0 20px 45px rgba(0,0,0,0.8);
}

.lane.active{
border:2px solid #22c55e;
box-shadow:0 0 25px rgba(34,197,94,0.6);
}

.lane h2{
margin:0;
font-size:20px;
color:#94a3b8;
}

.count{
font-size:48px;
font-weight:700;
margin-top:8px;
color:#38bdf8;
}

.signal-box{
margin-top:60px;
background:rgba(2,6,23,0.9);
padding:25px;
border-radius:14px;
text-align:center;
border:1px solid #1e293b;

box-shadow:0 10px 30px rgba(0,0,0,0.7);
}

.signal-title{
font-size:18px;
color:#94a3b8;
margin-bottom:10px;
}

.green{
font-size:34px;
font-weight:700;
color:#22c55e;
text-shadow:0 0 15px rgba(34,197,94,0.8);
}

footer{
text-align:center;
margin-top:40px;
padding:20px;
font-size:14px;
color:#64748b;
}

</style>

</head>

<body>

<header>
Intelligent Traffic Density Control System
</header>

<div class="dashboard">

<div class="container">

<div class="lane" id="laneBox1">
<h2>Lane 1</h2>
<div class="count" id="lane1">0</div>
</div>

<div class="lane" id="laneBox2">
<h2>Lane 2</h2>
<div class="count" id="lane2">0</div>
</div>

<div class="lane" id="laneBox3">
<h2>Lane 3</h2>
<div class="count" id="lane3">0</div>
</div>

<div class="lane" id="laneBox4">
<h2>Lane 4</h2>
<div class="count" id="lane4">0</div>
</div>

</div>

<div class="signal-box">
<div class="signal-title">Current Green Signal</div>
<div id="greenLane" class="green">Lane 0</div>
</div>

</div>

<footer>
Real-Time Smart Traffic Monitoring Dashboard
</footer>

<script>

function clearActive(){
document.querySelectorAll(".lane").forEach(l=>l.classList.remove("active"))
}

function updateTraffic(){

fetch("/data")
.then(response => response.json())
.then(data => {

document.getElementById("lane1").innerText=data.lane1;
document.getElementById("lane2").innerText=data.lane2;
document.getElementById("lane3").innerText=data.lane3;
document.getElementById("lane4").innerText=data.lane4;

document.getElementById("greenLane").innerText="Lane "+data.green;

clearActive()
document.getElementById("laneBox"+data.green).classList.add("active")

})
.catch(error => console.log(error));

}

setInterval(updateTraffic,2000);

</script>

</body>

</html>
